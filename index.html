<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamite 66</title>

<style>
body{background:#111;color:#fff;font-family:sans-serif;padding:10px;}
textarea{width:100%;height:180px;background:#1e1e1e;color:#0f0;}
button{padding:10px;margin:5px;border:none;border-radius:8px;background:#00ffcc;}
canvas{border:1px solid white;width:100%;max-width:400px;}
#controls{display:flex;justify-content:center;gap:10px;margin-top:10px;}
#controls button{font-size:18px;padding:15px;}
img{width:80px;margin:5px;}
</style>
</head>

<body>

<h2>💣 Dynamite 66 FINAL</h2>

<input type="file" id="files" multiple><br><br>

<textarea id="code">
set x 10
add x 5
print x

function hi
print hello
end

call hi

button clickMe Click Me

files load
image hero hero.png
show hero

make player at 50 80
color player red
speed player 5
</textarea>

<br>
<button onclick="run()">RUN</button>

<pre id="output"></pre>
<div id="ui"></div>

<canvas id="game" width="400" height="200"></canvas>

<div id="controls">
<button ontouchstart="moveStart('left')" ontouchend="moveStop()">⬅️</button>
<button ontouchstart="moveStart('up')" ontouchend="moveStop()">⬆️</button>
<button ontouchstart="moveStart('down')" ontouchend="moveStop()">⬇️</button>
<button ontouchstart="moveStart('right')" ontouchend="moveStop()">➡️</button>
</div>

<script>

let vars={}, funcs={}, arrays={};
let player={x:50,y:80,color:"yellow",speed:2};
let fileMap={}, images={}, sounds={};
let interval;
let board=["","","","","","","","",""];
let turn="X";

// FILE LOAD
files.onchange=function(e){
 fileMap={};
 for(let f of e.target.files){
  let r=new FileReader();
  r.onload=()=>fileMap[f.name]={type:f.type,data:r.result};
  r.readAsDataURL(f);
 }
};

// VALUE
function val(v){
 if(!isNaN(v)) return Number(v);
 return vars[v] ?? v;
}

// RUN
function run(){

 output.innerText="";
 ui.innerHTML="";
 vars={}; funcs={}; arrays={}; images={}; sounds={};

 let lines=code.value.split("\n");

 function exec(block){
  for(let i=0;i<block.length;i++){

   let line=block[i].trim();
   if(!line) continue;

   let p=line.split(" ");

   // VARIABLES + MATH
   if(p[0]=="set") vars[p[1]]=val(p[2]);
   else if(p[0]=="add") vars[p[1]]=val(p[1])+val(p[2]);
   else if(p[0]=="sub") vars[p[1]]=val(p[1])-val(p[2]);
   else if(p[0]=="mul") vars[p[1]]=val(p[1])*val(p[2]);
   else if(p[0]=="div") vars[p[1]]=val(p[1])/val(p[2]);

   // PRINT
   else if(p[0]=="print"){
    output.innerText += val(line.replace("print","").trim())+"\n";
   }

   // ARRAY
   else if(p[0]=="array") arrays[p[1]]=[];
   else if(p[0]=="push") arrays[p[1]].push(val(p[2]));
   else if(p[0]=="get") output.innerText+=arrays[p[1]][p[2]]+"\n";

   // IF ELSE
   else if(p[0]=="if"){
    let cond=val(p[1])>val(p[3]);
    let ifB=[], elseB=[], mode="if";
    i++;
    while(block[i] && block[i].trim()!="end"){
     if(block[i].trim()=="else"){mode="else";i++;continue;}
     (mode=="if"?ifB:elseB).push(block[i]); i++;
    }
    exec(cond?ifB:elseB);
   }

   // LOOP
   else if(p[0]=="repeat"){
    let c=val(p[1]), loopB=[];
    i++;
    while(block[i] && block[i].trim()!="end"){
     loopB.push(block[i]); i++;
    }
    for(let k=0;k<c;k++) exec(loopB);
   }

   // FUNCTION
   else if(p[0]=="function"){
    let name=p[1], fb=[];
    i++;
    while(block[i] && block[i].trim()!="end"){
     fb.push(block[i]); i++;
    }
    funcs[name]=fb;
   }

   else if(p[0]=="call"){
    if(funcs[p[1]]) exec(funcs[p[1]]);
   }

   // BUTTON UI
   else if(p[0]=="button"){
    let b=document.createElement("button");
    b.innerText=p.slice(2).join(" ");
    ui.appendChild(b);
   }

   // FILES
   else if(line=="files load"){
    output.innerText+="Files: "+Object.keys(fileMap).length+"\n";
   }

   else if(p[0]=="image"){
    if(fileMap[p[2]]) images[p[1]]=fileMap[p[2]].data;
   }

   else if(p[0]=="show"){
    let img=document.createElement("img");
    img.src=images[p[1]];
    ui.appendChild(img);
   }

   else if(p[0]=="sound"){
    if(fileMap[p[2]]) sounds[p[1]]=fileMap[p[2]].data;
   }

   else if(p[0]=="play"){
    new Audio(sounds[p[1]]).play();
   }

   // GAME
   else if(p[0]=="make"){
    player.x=Number(p[3]);
    player.y=Number(p[4]);
   }

   else if(p[0]=="color") player.color=p[2];
   else if(p[0]=="speed") player.speed=Number(p[2]);

   // OX GAME
   else if(p[0]=="start" && p[1]=="ox"){
    startOX();
   }

  }
 }

 exec(lines);
 startGame();
}

// GAME LOOP
function startGame(){
 let ctx=game.getContext("2d");

 function loop(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,400,200);

  ctx.fillStyle=player.color;
  ctx.fillRect(player.x,player.y,40,40);

  requestAnimationFrame(loop);
 }
 loop();
}

// MOBILE CONTROL
function move(dir){
 if(dir=="right") player.x+=player.speed;
 if(dir=="left") player.x-=player.speed;
 if(dir=="up") player.y-=player.speed;
 if(dir=="down") player.y+=player.speed;
}

function moveStart(d){ interval=setInterval(()=>move(d),50); }
function moveStop(){ clearInterval(interval); }

// KEYBOARD
document.addEventListener("keydown",e=>{
 if(e.key=="ArrowRight") move("right");
 if(e.key=="ArrowLeft") move("left");
 if(e.key=="ArrowUp") move("up");
 if(e.key=="ArrowDown") move("down");
});

// OX GAME
function startOX(){
 let ctx=game.getContext("2d");

 function draw(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,300,300);

  ctx.strokeStyle="white";
  ctx.beginPath();
  ctx.moveTo(100,0); ctx.lineTo(100,300);
  ctx.moveTo(200,0); ctx.lineTo(200,300);
  ctx.moveTo(0,100); ctx.lineTo(300,100);
  ctx.moveTo(0,200); ctx.lineTo(300,200);
  ctx.stroke();

  for(let i=0;i<9;i++){
   let x=(i%3)*100+30;
   let y=Math.floor(i/3)*100+60;
   ctx.fillStyle="white";
   ctx.font="40px Arial";
   ctx.fillText(board[i],x,y);
  }
 }

 draw();

 game.onclick=(e)=>{
  let r=game.getBoundingClientRect();
  let i=Math.floor((e.clientY-r.top)/100)*3+Math.floor((e.clientX-r.left)/100);

  if(board[i]==""){
   board[i]=turn;
   turn=(turn=="X")?"O":"X";
   draw();
  }
 };
}

</script>
</body>
</html>
